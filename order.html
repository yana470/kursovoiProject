<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма заказа</title>
    <link href="https://fonts.googleapis.com/css2?family=Jeju+Myeongjo&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="order.css">
</head>
<body>
<svg class="line-top-dark" width="100%" height="15">
    <rect width="100%" height="15" fill="#2b2b2b"/>
</svg>
<svg class="line-top-light" width="100%" height="15">
    <rect width="100%" height="15" fill="#A8C9A8"/>
</svg>
<svg class="line-left-dark" width="15" height="100%">
    <rect width="15" height="100%" fill="#2b2b2b"/>
</svg>
<svg class="line-left-light" width="15" height="100%">
    <rect width="15" height="100%" fill="#A8C9A8"/>
</svg>



<div class="wrapper">

    <!-- ЛЕВАЯ ЧАСТЬ -->
    <div class="form-block">

        <h2>Оформление заказа</h2>

        <form id="orderForm">

            <label>Ваше имя:</label>
            <input type="text" id="name" placeholder="Иван">

            <label>Ваша фамилия:</label>
            <input type="text" id="surname" placeholder="Иванов">

            <label>Ваш номер телефона:</label>
            <input type="text" id="phone" placeholder="+375 29 000 00 00">

            <button type="submit" class="submit-btn">Отправить</button>

            <button type="button" class="back-btn" onclick="location.href='catalog.html'">Вернуться назад</button>

            <button type="button" class="home-btn" onclick="location.href='index.html'">Главная</button>

            <p id="result"></p>

        </form>

    </div>

    <!-- ПРАВАЯ ЧАСТЬ -->
    <div class="image-block">
        <img src="TasteMap.png" alt="TasteMap">
    </div>

</div>

<script src="order.js"></script>

</body>
</html>
